name: CI — Run Tests

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  test:
    name: pytest
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      # ── 2. Set up Python ─────────────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # ── 3. Install dependencies ──────────────────────────────────────────────
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements-docker.txt
          pip install pytest pytest-cov httpx

      # ── 4. Run tests with coverage ───────────────────────────────────────────
      - name: Run pytest with coverage
        env:
          AZURE_OPENAI_KEY: "fake-key-for-ci"
          AZURE_OPENAI_ENDPOINT: "https://fake.openai.azure.com/"
          AZURE_OPENAI_API_VERSION: "2024-02-01"
          AZURE_OPENAI_DEPLOYMENT: "gpt-4o"
          DATABASE_URL: "postgresql://fake:fake@localhost:5432/fake"
          LANGFUSE_PUBLIC_KEY: "fake-public"
          LANGFUSE_SECRET_KEY: "fake-secret"
        run: |
          pytest --tb=short -q \
            --cov=backend \
            --cov-report=term-missing \
            --cov-report=html:coverage-report \
            --cov-report=xml:coverage.xml \
            --junitxml=test-results.xml

      # ── 5. Write coverage summary to GitHub Actions UI ───────────────────────
      - name: Publish coverage to job summary
        if: always()
        run: |
          echo "## 🧪 Test & Coverage Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Test result counts from junit xml
          python3 - <<'EOF'
          import xml.etree.ElementTree as ET, os

          tree = ET.parse("test-results.xml")
          root = tree.getroot()
          suite = root if root.tag == "testsuite" else root.find("testsuite")

          tests   = suite.get("tests", "?")
          failed  = suite.get("failures", "0")
          errors  = suite.get("errors", "0")
          skipped = suite.get("skipped", "0")
          passed  = str(int(tests) - int(failed) - int(errors) - int(skipped))
          time    = suite.get("time", "?")

          summary = os.environ["GITHUB_STEP_SUMMARY"]
          with open(summary, "a") as f:
              f.write(f"### Results\n")
              f.write(f"| ✅ Passed | ❌ Failed | ⚠️ Errors | ⏭️ Skipped | ⏱️ Duration |\n")
              f.write(f"|-----------|-----------|-----------|------------|-------------|\n")
              f.write(f"| {passed}  | {failed}  | {errors}  | {skipped}  | {time}s     |\n\n")
          EOF

          # Coverage table
          echo "### Coverage by module" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Module | Statements | Missed | Coverage |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-----------|--------|----------|" >> $GITHUB_STEP_SUMMARY

          python3 - <<'EOF'
          import xml.etree.ElementTree as ET, os

          tree = ET.parse("coverage.xml")
          root = tree.getroot()
          summary = os.environ["GITHUB_STEP_SUMMARY"]

          with open(summary, "a") as f:
              for pkg in root.iter("package"):
                  for cls in pkg.iter("class"):
                      name     = cls.get("filename", "").replace("backend/", "")
                      stmts    = cls.get("line-rate", "0")
                      lines    = [l for l in cls.iter("line")]
                      total    = len(lines)
                      missed   = sum(1 for l in lines if l.get("hits") == "0")
                      covered  = total - missed
                      pct      = round((covered / total * 100) if total else 0)
                      bar      = "🟢" if pct >= 80 else "🟡" if pct >= 60 else "🔴"
                      f.write(f"| `{name}` | {total} | {missed} | {bar} {pct}% |\n")

              # Total line
              total_stmts = int(root.get("lines-valid", 0))
              total_miss  = int(root.get("lines-valid", 0)) - int(root.get("lines-covered", 0))
              total_pct   = round(float(root.get("line-rate", 0)) * 100)
              bar         = "🟢" if total_pct >= 80 else "🟡" if total_pct >= 60 else "🔴"
              f.write(f"| **TOTAL** | **{total_stmts}** | **{total_miss}** | **{bar} {total_pct}%** |\n")
          EOF

      # ── 6. Upload HTML report as artifact (for line-by-line detail) ──────────
      - name: Upload HTML coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage-report/
          retention-days: 30
