name: CI — Run Tests

on:
  push:
    branches: ["**"]        # every branch push
  pull_request:
    branches: ["**"]        # every PR

jobs:
  test:
    name: pytest
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      # ── 2. Set up Python ─────────────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements-docker.txt

      # ── 3. Install dependencies ──────────────────────────────────────────────
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements-docker.txt
          pip install pytest httpx

      # ── 4. Run tests ─────────────────────────────────────────────────────────
      #    All Azure / DB credentials are fakes — the test suite mocks everything.
      - name: Run pytest
        env:
          AZURE_OPENAI_KEY: "fake-key-for-ci"
          AZURE_OPENAI_ENDPOINT: "https://fake.openai.azure.com/"
          AZURE_OPENAI_API_VERSION: "2024-02-01"
          AZURE_OPENAI_DEPLOYMENT: "gpt-4o"
          DATABASE_URL: "postgresql://fake:fake@localhost:5432/fake"
          LANGFUSE_PUBLIC_KEY: "fake-public"
          LANGFUSE_SECRET_KEY: "fake-secret"
        run: |
          pytest --tb=short -q

      # ── 5. Upload test report on failure ─────────────────────────────────────
      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-results
          path: .pytest_cache/
          retention-days: 7
