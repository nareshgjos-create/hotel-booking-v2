services:

  db:
    image: postgres:17-alpine
    container_name: hotel-booking-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ITC2026
      POSTGRES_DB: hotel_booking
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: hotel-booking-backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://postgres:ITC2026@db:5432/hotel_booking
    volumes:
      - ./logs:/app/logs
      - ./backend/db:/app/backend/db
      - uploads_data:/app/uploads
    depends_on:
      db:
        condition: service_healthy
    restart: always

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: hotel-booking-frontend
    ports:
      - "8502:8501"
    env_file:
      - .env
    environment:
      - API_URL=http://backend:8000
    depends_on:
      - backend
    restart: always

  pgadmin:
    image: dpage/pgadmin4
    container_name: hotel-booking-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - db
    restart: always


volumes:
  postgres_data:
  uploads_data:
